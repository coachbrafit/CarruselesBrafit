<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Panoramic 3 Slices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #333;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        /* Contenedor principal - imagen horizontal completa */
        .panoramic-container {
            width: 1550px;
            height: 600px;
            background: linear-gradient(to right, #5B9BD5 0%, #6BA3D8 33%, #4A90E2 66%, #3B7DD8 100%);
            display: flex;
            position: relative;
            flex-shrink: 0;
        }

        /* Líneas guía para cortar */
        .cut-line {
            position: absolute;
            top: 0;
            width: 3px;
            height: 100%;
            background: rgba(255,255,255,0.6);
            z-index: 100;
        }

        .cut-line-1 { left: 1080px; }
        .cut-line-2 { left: 2160px; }

        /* Columnas */
        .column {
            width: 1080px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            border-right: 2px solid rgba(255,255,255,0.3);
        }

        .column:last-child {
            border-right: none;
        }

        /* Destellos */
        .sparkle {
            position: absolute;
            color: white;
            font-size: 32px;
            z-index: 10;
        }

        /* COLUMN 1 - Transformaciones */
        .col-1 .sparkle { top: 50px; left: 50px; }

        .col-1 {
            text-align: center;
        }

        .col-1 h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3.5rem;
            color: #1a3a5c;
            font-weight: 400;
            margin-bottom: 15px;
            line-height: 1.3;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
        }

        .col-1 h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            color: #0d2137;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
        }

        /* COLUMN 2 - Imagen Central */
        .col-2 {
            position: relative;
            overflow: hidden;
        }

        .col-2 .sparkle-top { 
            top: 50px; 
            right: 50px; 
        }

        .image-wrapper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            height: 75%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .person-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            background: linear-gradient(to bottom, #87CEEB 0%, #5B9BD5 50%, #4A90E2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            text-align: center;
        }

        .quien-soy {
            position: absolute;
            top: 80px;
            right: 80px;
            text-align: center;
            z-index: 20;
        }

        .quien-soy h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: #0d2137;
            font-weight: 700;
            line-height: 1;
        }

        .quien-soy h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #0d2137;
            text-transform: uppercase;
        }

        .arrow {
            font-size: 3.5rem;
            color: #0d2137;
            margin-top: 10px;
            font-weight: bold;
        }

        /* COLUMN 3 - Método */
        .col-3 .sparkle { top: 50px; right: 50px; }

        .col-3 {
            text-align: center;
        }

        .metodo-title {
            margin-bottom: 80px;
        }

        .metodo-title h3 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3.5rem;
            color: #1a3a5c;
            font-weight: 400;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
        }

        .metodo-title h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 6rem;
            font-weight: 800;
            color: #0d2137;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 5px;
        }

        .metodo-title h4 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #0d2137;
            text-transform: uppercase;
            letter-spacing: 6px;
        }

        .que-es-box {
            background: rgba(255,255,255,0.95);
            padding: 50px 45px;
            border-radius: 10px;
            transform: rotate(-2deg);
            box-shadow: 5px 5px 20px rgba(0,0,0,0.15);
        }

        .que-es-box p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.5rem;
            color: #1a3a5c;
            line-height: 1.4;
        }

        /* Labels */
        .labels {
            display: flex;
            width: 3240px;
            justify-content: space-around;
            margin-bottom: 10px;
            color: white;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .label {
            width: 1080px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="labels">
        <div class="label">Post 1/3 - Cortar aquí</div>
        <div class="label">Post 2/3 - Cortar aquí</div>
        <div class="label">Post 3/3 - Cortar aquí</div>
    </div>

    <div class="panoramic-container">
        <!-- Líneas guía para cortar -->
        <div class="cut-line cut-line-1"></div>
        <div class="cut-line cut-line-2"></div>

        <!-- COLUMN 1: Transformaciones -->
        <div class="column col-1">
            <div class="sparkle">✦</div>
            <h2>Transformaciones y</h2>
            <h3>TESTIMONIOS</h3>
        </div>

        <!-- COLUMN 2: Quién Soy + Imagen -->
        <div class="column col-2">
            <div class="sparkle sparkle-top">✦</div>
            <div class="quien-soy">
                <h2>Quién</h2>
                <h3>SOY</h3>
                <div class="arrow">→</div>
            </div>
            <div class="image-wrapper">
                <div class="person-image">
                    TU IMAGEN<br>AQUÍ
                </div>
            </div>
        </div>

        <!-- COLUMN 3: Método -->
        <div class="column col-3">
            <div class="sparkle">✦</div>
            <div class="metodo-title">
                <h3>Método</h3>
                <h2>CORE</h2>
                <h4>SEGURO</h4>
            </div>
            <div class="que-es-box">
                <p>¿Qué es y<br>para quién es?</p>
            </div>
        </div>
    </div>
</body>
</html>
