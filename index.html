<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAFIT Instagram Carousel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brafit-navy: #0d1b2a;
            --brafit-navy-mid: #1b263b;
            --brafit-navy-light: #415a77;
            --brafit-gold: #c9a227;
            --brafit-gold-light: #e0b840;
            --brafit-cream: #e0e1dd;
            --brafit-cream-light: #f5f5f0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #222;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        .panoramic-container {
            width: 1800px;
            height: 700px;
            background: linear-gradient(to bottom, 
                var(--brafit-cream-light) 0%, 
                var(--brafit-cream) 20%,
                var(--brafit-navy-light) 60%,
                var(--brafit-navy-mid) 80%,
                var(--brafit-navy) 100%);
            display: flex;
            position: relative;
            flex-shrink: 0;
        }

        .cut-line {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(201, 162, 39, 0.4);
            z-index: 100;
        }

        .cut-line-1 { left: 600px; }
        .cut-line-2 { left: 1200px; }

        .column {
            width: 600px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            background: transparent;
        }

        .sparkle {
            position: absolute;
            color: var(--brafit-gold);
            font-size: 32px;
            z-index: 10;
        }

        /* ========== LOGO BTP - ESTILOS NUEVOS ========== */
        .logo-btp {
            width: 180px;           /* Ajusta el tamaño según necesites */
            height: auto;
            margin-top: 80px;       /* 🔽 ESTO BAJA EL LOGO - aumenta para bajar más */
            margin-bottom: 20px;    /* Espacio debajo del logo */
            display: block;
            filter: drop-shadow(2px 2px 4px rgba(13,27,42,0.3));
        }

        /* COLUMN 1 - Método */
        .col-1 .sparkle { top: 50px; right: 50px; }
        .col-1 { text-align: center; }
        .col-1 .metodo-title { margin-bottom: 20px; } /* Reducido para hacer espacio al logo */
        .col-1 .metodo-title h3 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--brafit-navy);
            font-weight: 400;
            margin-bottom: 10px;
        }
        .col-1 .metodo-title h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            font-weight: 800;
            color: var(--brafit-navy);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 5px;
        }
        .col-1 .metodo-title h4 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--brafit-gold);
            text-transform: uppercase;
            letter-spacing: 6px;
        }
        .col-1 .que-es-box {
            background: rgba(13,27,42,0.9);
            padding: 40px 35px;
            border-radius: 10px;
            transform: rotate(-2deg);
            box-shadow: 5px 5px 20px rgba(13,27,42,0.5);
            border: 2px solid var(--brafit-gold);
            margin-top: 20px; /* Espacio después del logo */
        }
        .col-1 .que-es-box p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2rem;
            color: var(--brafit-cream-light);
            line-height: 1.4;
        }

        /* COLUMN 2 - Quién Soy + Imagen */
        .col-2 {
            position: relative;
            overflow: hidden;
        }
        .col-2 .sparkle-top { 
            top: 50px; 
            right: 50px; 
        }
        .image-wrapper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        .person-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .quien-soy {
            position: absolute;
            top: 80px;
            right: 80px;
            text-align: center;
            z-index: 20;
        }
        .quien-soy h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.8rem;
            color: var(--brafit-navy);
            font-weight: 700;
            line-height: 1;
        }
        .quien-soy h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--brafit-gold);
            text-transform: uppercase;
        }
        .arrow {
            font-size: 3rem;
            color: var(--brafit-gold);
            margin-top: 10px;
            font-weight: bold;
        }

        /* COLUMN 3 - Transformaciones */
        .col-3 .sparkle { top: 50px; left: 50px; }
        .col-3 { text-align: center; }
        .col-3 h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--brafit-cream-light);
            font-weight: 400;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        .col-3 h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--brafit-cream-light);
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
        }

        /* Labels */
        .labels {
            display: flex;
            width: 1800px;
            justify-content: space-around;
            margin-bottom: 10px;
            color: var(--brafit-cream-light);
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .label {
            width: 600px;
            text-align: center;
            background: var(--brafit-navy);
            padding: 10px;
            border: 2px solid var(--brafit-gold);
        }
    </style>
</head>
<body>
    <div class="labels">
        <div class="label">Post 1/3 - Método</div>
        <div class="label">Post 2/3 - Quién Soy</div>
        <div class="label">Post 3/3 - Transformaciones</div>
    </div>

    <div class="panoramic-container">
        <div class="cut-line cut-line-1"></div>
        <div class="cut-line cut-line-2"></div>

        <!-- COLUMN 1: Método -->
        <div class="column col-1">
            <div class="sparkle">✦</div>
            <div class="metodo-title">
