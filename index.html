<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAFIT - Instagram Carousel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* COLORES BRAFIT */
            --brafit-navy: #0d1b2a;
            --brafit-navy-light: #1b263b;
            --brafit-gold: #c9a227;
            --brafit-gold-light: #e0b840;
            --brafit-cream: #f5f5dc;
            --brafit-cream-dark: #e8e4d9;
            --brafit-gray: #6b7280;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #222;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        /* Contenedor principal - imagen horizontal completa */
        .panoramic-container {
            width: 1800px;
            height: 700px;
            background: linear-gradient(to right, 
                var(--brafit-cream) 0%, 
                var(--brafit-cream-dark) 50%, 
                var(--brafit-cream) 100%);
            display: flex;
            position: relative;
            flex-shrink: 0;
            border: 4px solid var(--brafit-navy);
        }

        /* Líneas guía para cortar */
        .cut-line {
            position: absolute;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--brafit-gold);
            z-index: 100;
        }

        .cut-line-1 { left: 600px; }
        .cut-line-2 { left: 1200px; }

        /* Columnas */
        .column {
            width: 600px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            border-right: 2px solid var(--brafit-navy);
        }

        .column:last-child {
            border-right: none;
        }

        /* Destellos dorados */
        .sparkle {
            position: absolute;
            color: var(--brafit-gold);
            font-size: 32px;
            z-index: 10;
        }

        /* COLUMN 1 - Transformaciones */
        .col-1 .sparkle { top: 50px; left: 50px; }

        .col-1 {
            text-align: center;
        }

        .col-1 h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--brafit-navy);
            font-weight: 400;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .col-1 h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--brafit-navy);
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
        }

        /* COLUMN 2 - Imagen Central */
        .col-2 {
            position: relative;
            overflow: hidden;
        }

        .col-2 .sparkle-top { 
            top: 50px; 
            right: 50px; 
        }

        .image-wrapper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            height: 75%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .person-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            background: linear-gradient(to bottom, 
                var(--brafit-cream-dark) 0%, 
                var(--brafit-navy-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brafit-cream);
            font-size: 1.5rem;
            text-align: center;
            border: 3px solid var(--brafit-gold);
        }

        .quien-soy {
            position: absolute;
            top: 80px;
            right: 80px;
            text-align: center;
            z-index: 20;
        }

        .quien-soy h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.8rem;
            color: var(--brafit-navy);
            font-weight: 700;
            line-height: 1;
        }

        .quien-soy h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--brafit-gold);
            text-transform: uppercase;
        }

        .arrow {
            font-size: 3rem;
            color: var(--brafit-gold);
            margin-top: 10px;
            font-weight: bold;
        }

        /* COLUMN 3 - Método */
        .col-3 .sparkle { top: 50px; right: 50px; }

        .col-3 {
            text-align: center;
        }

        .metodo-title {
            margin-bottom: 60px;
        }

        .metodo-title h3 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--brafit-navy);
            font-weight: 400;
            margin-bottom: 10px;
        }

        .metodo-title h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            font-weight: 800;
            color: var(--brafit-navy);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 5px;
        }

        .metodo-title h4 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--brafit-gold);
            text-transform: uppercase;
            letter-spacing: 6px;
        }

        .que-es-box {
            background: var(--brafit-navy);
            padding: 40px 35px;
            border-radius: 10px;
            transform: rotate(-2deg);
            box-shadow: 5px 5px 20px rgba(13,27,42,0.3);
            border: 2px solid var(--brafit-gold);
        }

        .que-es-box p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2rem;
            color: var(--brafit-cream);
            line-height: 1.4;
        }

        /* Labels */
        .labels {
            display: flex;
            width: 1800px;
            justify-content: space-around;
            margin-bottom: 10px;
            color: var(--brafit-cream);
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .label {
            width: 600px;
            text-align: center;
            background: var(--brafit-navy);
            padding: 10px;
            border: 2px solid var(--brafit-gold);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="labels">
        <div class="label">Post 1/3 - Cortar aquí</div>
        <div class="label">Post 2/3 - Cortar aquí</div>
        <div class="label">Post 3/3 - Cortar aquí</div>
    </div>

    <div class="panoramic-container">
        <!-- Líneas guía para cortar -->
        <div class="cut-line cut-line-1"></div>
        <div class="cut-line cut-line-2"></div>

        <!-- COLUMN 1: Transformaciones -->
        <div class="column col-1">
            <div class="sparkle">✦</div>
            <h2>Transformaciones y</h2>
            <h3>TESTIMONIOS</h3>
        </div>

        <!-- COLUMN 2: Quién Soy + Imagen -->
        <div class="column col-2">
            <div class="sparkle sparkle-top">✦</div>
            <div class="quien-soy">
                <h2>Quién</h2>
                <h3>SOY</h3>
                <div class="arrow">→</div>
            </div>
            <div class="image-wrapper">
                <div class="person-image">
                    TU IMAGEN<br>AQUÍ
                </div>
            </div>
        </div>

        <!-- COLUMN 3: Método -->
        <div class="column col-3">
            <div class="sparkle">✦</div>
            <div class="metodo-title">
                <h3>Método</h3>
                <h2>CORE</h2>
                <h4>SEGURO</h4>
            </div>
            <div class="que-es-box">
                <p>¿Qué es y<br>para quién es?</p>
            </div>
        </div>
    </div>
</body>
</html>
