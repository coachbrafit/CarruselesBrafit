<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Panoramic - 3 Slices</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor principal - imagen horizontal completa */
        .panoramic-container {
            width: 3240px;
            height: 1350px;
            background: linear-gradient(90deg, #5B9BD5 0%, #6BA3D8 15%, #5B9BD5 33%, #4A90E2 50%, #4A90E2 66%, #3B7DD8 85%, #3B7DD8 100%);
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Líneas guía para cortar (visibles solo en el template) */
        .cut-line {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.3);
            z-index: 100;
        }

        .cut-line-1 { left: 1080px; }
        .cut-line-2 { left: 2160px; }

        /* Columnas */
        .column {
            width: 1080px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
        }

        /* Separadores sutiles */
        .column:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 5%;
            height: 90%;
            width: 1px;
            background: rgba(255,255,255,0.2);
        }

        /* Destellos */
        .sparkle {
            position: absolute;
            color: white;
            font-size: 28px;
            animation: twinkle 2s infinite;
            z-index: 10;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* COLUMN 1 - Transformaciones */
        .col-1 .sparkle { top: 50px; left: 50px; }

        .col-1 {
            text-align: center;
        }

        .col-1 h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3.5rem;
            color: #2C3E50;
            font-weight: 400;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .col-1 h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            color: #1A2A3A;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
        }

        /* COLUMN 2 - Imagen Central */
        .col-2 {
            position: relative;
            overflow: visible;
        }

        .col-2 .sparkle-top { 
            top: 50px; 
            right: 50px; 
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 85%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .person-image {
            width: 95%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            border-radius: 0;
            /* Placeholder gradient */
            background: linear-gradient(180deg, #87CEEB 0%, #5B9BD5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-family: 'Montserrat', sans-serif;
        }

        .quien-soy {
            position: absolute;
            top: 80px;
            right: 80px;
            text-align: center;
            z-index: 20;
        }

        .quien-soy h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: #1A2A3A;
            font-weight: 700;
            line-height: 1;
        }

        .quien-soy h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #1A2A3A;
            text-transform: uppercase;
        }

        .arrow {
            font-size: 3.5rem;
            color: #1A2A3A;
            margin-top: 10px;
            font-weight: bold;
        }

        /* COLUMN 3 - Método */
        .col-3 .sparkle { top: 50px; right: 50px; }

        .col-3 {
            text-align: center;
        }

        .metodo-title {
            margin-bottom: 80px;
        }

        .metodo-title h3 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3.5rem;
            color: #2C3E50;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .metodo-title h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 6rem;
            font-weight: 800;
            color: #1A2A3A;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 5px;
        }

        .metodo-title h4 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #1A2A3A;
            text-transform: uppercase;
            letter-spacing: 6px;
        }

        .que-es-box {
            background: rgba(255,255,255,0.95);
            padding: 50px 45px;
            border-radius: 10px;
            transform: rotate(-2deg);
            box-shadow: 5px 5px 20px rgba(0,0,0,0.15);
        }

        .que-es-box p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.5rem;
            color: #2C3E50;
            line-height: 1.4;
        }

        /* Preview mode para visualización */
        .preview-mode {
            transform: scale(0.25);
            transform-origin: top left;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .preview-container {
            position: relative;
        }

        .slice-labels {
            position: absolute;
            top: -30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #888;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .slice-label {
            width: 1080px;
            text-align: center;
        }

        /* Responsive para pantallas pequeñas */
        @media (max-width: 3400px) {
            .preview-mode {
                transform: scale(0.2);
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="preview-container">
        <div class="slice-labels">
            <div class="slice-label">Slice 1: Post 1/3</div>
            <div class="slice-label">Slice 2: Post 2/3</div>
            <div class="slice-label">Slice 3: Post 3/3</div>
        </div>

        <div class="panoramic-container preview-mode">
            <!-- Líneas guía para cortar -->
            <div class="cut-line cut-line-1"></div>
            <div class="cut-line cut-line-2"></div>

            <!-- COLUMN 1: Transformaciones -->
            <div class="column col-1">
                <div class="sparkle">✦</div>
                <h2>Transformaciones y</h2>
                <h3>TESTIMONIOS</h3>
            </div>

            <!-- COLUMN 2: Quién Soy + Imagen -->
            <div class="column col-2">
                <div class="sparkle sparkle-top">✦</div>
                <div class="quien-soy">
                    <h2>Quién</h2>
                    <h3>SOY</h3>
                    <div class="arrow">→</div>
                </div>
                <div class="image-wrapper">
                    <div class="person-image">
                        [TU IMAGEN AQUÍ - 1080x1350]
                    </div>
                </div>
            </div>

            <!-- COLUMN 3: Método -->
            <div class="column col-3">
                <div class="sparkle">✦</div>
                <div class="metodo-title">
                    <h3>Método</h3>
                    <h2>CORE</h2>
                    <h4>SEGURO</h4>
                </div>
                <div class="que-es-box">
                    <p>¿Qué es y<br>para quién es?</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
